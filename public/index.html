<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Chat App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --border-color: #3a3a5c;
      --text-color: #e1e1e6;
      --sent-bg: #4a6cf7;
      --received-bg: #2c3e50;
      --input-bg: #3a3a5c;
      --reply-color: #f1c40f;
      --transition: all 0.3s ease;
    }

    .light-mode {
      --bg-primary: #f9f9f9;
      --bg-secondary: #ffffff;
      --border-color: #e0e0e0;
      --text-color: #2c3e50;
      --received-bg: #f0f0f0;
      --input-bg: #f5f5f5;
      --reply-color: #e67e22;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      transition: var(--transition);
    }

    body {
      background: var(--bg-primary);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* Safe area for iPhone Notch */
    @supports (padding: max(0px)) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }

    /* Username Modal */
    #usernameModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .modal-content {
      width: 90%;
      max-width: 400px;
      background: var(--bg-secondary);
      padding: 30px;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .modal-content h2 {
      margin-bottom: 16px;
      color: var(--text-color);
      font-size: 1.3rem;
      font-weight: 600;
    }

    .modal-content input {
      width: 100%;
      padding: 16px;
      margin: 16px 0;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      outline: none;
      background: var(--input-bg);
      color: var(--text-color);
      font-size: 1rem;
      font-family: inherit;
    }

    .modal-content button {
      margin-top: 16px;
      padding: 14px 24px;
      background: #4a6cf7;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: 0.5px;
    }

    .modal-content button:hover {
      opacity: 0.9;
    }

    /* Chat UI */
    #chatContainer {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .chat-header {
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-color);
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    #themeToggle {
      margin-left: auto;
      background: var(--input-bg);
      color: var(--text-color);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    #themeToggle:hover {
      transform: scale(1.05);
    }

    .chat-messages {
      flex: 1;
      padding: 16px 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 20px;
      line-height: 1.5;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease-out;
      position: relative;
    }

    .received {
      background: var(--received-bg);
      color: var(--text-color);
      align-self: flex-start;
    }

    .sent {
      background: var(--sent-bg);
      color: white;
      align-self: flex-end;
    }

    /* Reply indicator */
    .reply-to {
      display: flex;
      background: rgba(0, 0, 0, 0.08);
      border-left: 4px solid var(--reply-color);
      padding: 8px 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .reply-to strong {
      font-size: 0.95rem;
      display: block;
    }

    .reply-to .message-text {
      font-size: 0.9rem;
      opacity: 0.9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    .reply-to img {
      max-width: 44px;
      border-radius: 8px;
      margin-top: 4px;
    }

    /* Caption box (reused style) */
    .caption-box {
      display: flex;
      background: rgba(0, 0, 0, 0.08);
      border-left: 4px solid var(--reply-color);
      padding: 8px 12px;
      margin-top: 8px;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .caption-box .caption-text {
      font-size: 0.9rem;
      opacity: 0.9;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .message small {
      font-size: 0.75rem;
      opacity: 0.75;
      margin-top: 6px;
      display: inline-block;
    }

    /* Links in messages */
    .message a {
      color: #4a90e2;
      text-decoration: underline;
      word-break: break-all;
      font-weight: 500;
    }

    /* Image styling */
    .message img {
      max-width: 100%;
      border-radius: 16px;
      margin-top: 10px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    /* Fullscreen image viewer */
    .fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      cursor: zoom-out;
    }

    .fullscreen img {
      max-width: 95vw;
      max-height: 95vh;
      border-radius: 12px;
      object-fit: contain;
    }

    /* Link Warning Modal */
    #linkModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 3000;
      display: none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .link-modal-content {
      background: var(--bg-secondary);
      padding: 28px;
      border-radius: 16px;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      color: var(--text-color);
    }

    .link-modal-content h3 {
      margin-bottom: 14px;
      font-size: 1.2rem;
    }

    .link-modal-content p {
      margin-bottom: 18px;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .
